name: CI - Tests and Quality Checks

on:
  push:
    branches:
      - master
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - master
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker compose build tests
      
      - name: Train model (generate artifacts)
        run: docker compose run --rm train
      
      - name: Run tests with coverage
        run: docker compose run --rm tests
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
      
      - name: Check coverage threshold
        run: |
          COVERAGE=$(docker compose run --rm tests | grep "TOTAL" | awk '{print $NF}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if [ $(echo "$COVERAGE < 80" | bc) -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets 80% threshold"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flake8 black isort
      
      - name: Check code formatting with black
        run: |
          black --check app/ src/ tests/ || echo "⚠️  Code formatting issues found. Run 'black app/ src/ tests/' to fix."
      
      - name: Check import sorting with isort
        run: |
          isort --check-only app/ src/ tests/ || echo "⚠️  Import sorting issues found. Run 'isort app/ src/ tests/' to fix."
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app/ src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 app/ src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety
      
      - name: Check dependencies for vulnerabilities
        run: |
          safety check -r requirements.txt --output text || echo "⚠️  Vulnerabilities found in dependencies"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API Docker image
        run: docker build -t risk-api:test .
      
      - name: Test container health
        run: |
          docker run -d --name test-api -p 8000:8080 risk-api:test
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
          docker rm test-api
          echo "✅ Container is healthy"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security, docker-build]
    if: always()
    
    steps:
      - name: Check CI status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **CI Failed** - Fix issues before merging" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY
