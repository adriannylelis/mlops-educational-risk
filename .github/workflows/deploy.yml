name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Permite execução manual

permissions:
  contents: read
  deployments: write

env:
  REGION: us-central1
  REPOSITORY: mlops-risk
  IMAGE_NAME: risk-api
  SERVICE_NAME: risk-api

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    # Só executa se CI passou (implícito no push para master)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve active GCP project
        id: gcp-project
        run: |
          PROJECT_ID=$(gcloud config get-value project 2>/dev/null || true)
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "(unset)" ]; then
            echo "❌ GCP project not configured. Set secret GCP_PROJECT_ID in GitHub Actions secrets."
            exit 1
          fi
          echo "Using project: $PROJECT_ID"
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      
      - name: Train model
        run: |
          echo "🚀 Training model..."
          docker compose build train
          docker compose run --rm train
          echo "✅ Model trained"
      
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          docker compose build tests
          docker compose run --rm tests
          echo "✅ Tests passed"
      
      - name: Enable required APIs
        run: |
          gcloud services enable cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            run.googleapis.com \
            --project=${{ steps.gcp-project.outputs.project_id }}
      
      - name: Create Artifact Registry repository (if not exists)
        continue-on-error: true
        run: |
          gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="MLOps Educational Risk - Docker images" \
            --project=${{ steps.gcp-project.outputs.project_id }} || echo "Repository already exists"
      
      - name: Build and push Docker image
        id: build-image
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ steps.gcp-project.outputs.project_id }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          
          echo "🔨 Building image: ${IMAGE_URL}:${{ github.sha }}"
          docker build -t ${IMAGE_URL}:${{ github.sha }} -t ${IMAGE_URL}:latest .
          
          echo "📤 Pushing image..."
          docker push ${IMAGE_URL}:${{ github.sha }}
          docker push ${IMAGE_URL}:latest
          
          echo "image_url=${IMAGE_URL}" >> $GITHUB_OUTPUT
      
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.build-image.outputs.image_url }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=10 \
            --min-instances=0 \
            --timeout=300 \
            --port=8080 \
            --set-env-vars="ENVIRONMENT=production,VERSION=${{ github.sha }}" \
            --project=${{ steps.gcp-project.outputs.project_id }}
      
      - name: Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ steps.gcp-project.outputs.project_id }} \
            --format='value(status.url)')
          echo "url=${SERVICE_URL}" >> $GITHUB_OUTPUT
      
      - name: Test deployment
        run: |
          echo "🧪 Testing deployment at ${{ steps.get-url.outputs.url }}"

          # Retry health endpoint (Cloud Run pode demorar a ficar pronto)
          HEALTH_STATUS=""
          for attempt in {1..12}; do
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-url.outputs.url }}/health || true)
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed on attempt $attempt"
              break
            fi
            echo "⏳ Health check attempt $attempt/12 returned: $HEALTH_STATUS"
            sleep 10
          done

          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "❌ Health check failed after retries. Last status: $HEALTH_STATUS"
            exit 1
          fi

          # Retry predict endpoint
          PREDICT_RESPONSE=""
          PREDICT_OK="false"
          for attempt in {1..6}; do
            PREDICT_RESPONSE=$(curl -s -X POST ${{ steps.get-url.outputs.url }}/predict \
              -H "Content-Type: application/json" \
              -d '{
                "INDE": 5.2, "IAA": 6.1, "IAN": 5.8, "IDA": 6.5,
                "IEG": 7.2, "IPP": 5.9, "IPS": 6.3, "IPV": 5.7,
                "PEDRA": "Ametista", "PONTO_VIRADA": 0,
                "FASE": 3, "ANO_REFERENCIA": 2021
              }')

            if echo "$PREDICT_RESPONSE" | grep -q "score_risco"; then
              PREDICT_OK="true"
              echo "✅ Predict endpoint working on attempt $attempt"
              break
            fi

            echo "⏳ Predict attempt $attempt/6 did not return expected payload"
            sleep 5
          done

          if [ "$PREDICT_OK" != "true" ]; then
            echo "❌ Predict endpoint failed after retries"
            echo "Response: $PREDICT_RESPONSE"
            exit 1
          fi

          echo "Response: $PREDICT_RESPONSE"
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.get-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- Health: [${{ steps.get-url.outputs.url }}/health](${{ steps.get-url.outputs.url }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "- Predict: \`POST ${{ steps.get-url.outputs.url }}/predict\`" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: [${{ steps.get-url.outputs.url }}/docs](${{ steps.get-url.outputs.url }}/docs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.build-image.outputs.image_url }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
      
      - name: Create GitHub deployment
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deploy to Cloud Run'
            });
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
